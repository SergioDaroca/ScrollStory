<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SS</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#000;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column}.header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #333;background:#000;position:sticky;top:0;z-index:100}.brand{font-size:18px;font-weight:bold;color:#0ff;letter-spacing:2px}.brand span:last-child{color:#fff}.controls{display:flex;gap:10px;align-items:center}.switch{width:40px;height:20px;background:#333;border-radius:10px;position:relative;cursor:pointer}.switch::before{content:'';position:absolute;width:16px;height:16px;background:#0ff;border-radius:50%;top:2px;left:2px;transition:transform .2s}.switch.vertical::before{transform:translateX(0)}.switch.horizontal::before{transform:translateX(20px)}.main{display:flex;flex:1;overflow:hidden}.timeline-sidebar{width:60px;background:#000;border-right:1px solid #333;position:relative;overflow:hidden}.scrubber{position:absolute;top:0;left:0;right:0;height:100%;background:linear-gradient(to bottom,transparent,rgba(0,255,255,0.1),transparent);pointer-events:none}.timeline-dots{position:absolute;top:0;left:20px;width:20px}.dot{position:absolute;width:8px;height:8px;background:#666;border-radius:50%;cursor:pointer;transition:all .2s}.dot:hover,.dot.active{background:#0ff;transform:scale(1.2)}.canvas-container{flex:1;overflow:auto;position:relative;background:#111}.canvas{position:relative;min-height:100%;padding:40px 20px}.bottom-panel{height:120px;background:#000;border-top:1px solid #333;display:flex;flex-direction:column;padding:10px 20px}.timeline{flex:1;display:flex;align-items:center;justify-content:center;position:relative}.timeline-line{position:absolute;height:2px;background:#333;left:0;right:0;top:50%;transform:translateY(-1px)}.timeline-marker{position:absolute;width:2px;height:20px;background:#0ff;top:50%;transform:translate(-50%,-50%);cursor:pointer}.in-marker{left:20%}.on-marker{left:50%}.out-marker{left:80%}.timeline-label{position:absolute;top:50%;transform:translate(-50%,25px);font-size:10px;color:#666;white-space:nowrap}.in-label{left:20%}.on-label{left:50%}.out-label{left:80%}.anim-controls{display:flex;justify-content:center;gap:20px;padding-top:10px}.anim-value{width:40px;height:20px;background:#333;border:none;color:#fff;font-size:12px;text-align:center;cursor:pointer}.aligner{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:30px;height:30px;gap:4px;cursor:pointer}.aligner-dot{width:6px;height:6px;background:#666;border-radius:50%;transition:all .2s}.aligner-dot:hover{background:#0ff;transform:scale(1.5)}.btn{background:#333;border:none;color:#fff;padding:5px 10px;font-size:12px;cursor:pointer;border-radius:3px}.btn:hover{background:#0ff;color:#000}.actor.active{outline:2px solid #0ff;outline-offset:2px}.export-panel{position:fixed;bottom:20px;right:20px;background:#000;border:1px solid #333;padding:10px;border-radius:5px;max-width:300px;display:none}.export-panel.visible{display:block}.export-textarea{width:100%;height:150px;background:#111;border:1px solid #333;color:#fff;font-family:monospace;font-size:10px;resize:none}.export-actions{display:flex;gap:5px;margin-top:5px}</style></head><body><div class="header"><div class="brand"><span>Scroll</span><span>Story</span></div><div class="controls"><div class="switch vertical" id="orientationSwitch"></div><div class="aligner" id="aligner"><div class="aligner-dot" data-align="TL"></div><div class="aligner-dot" data-align="TC"></div><div class="aligner-dot" data-align="TR"></div><div class="aligner-dot" data-align="ML"></div><div class="aligner-dot" data-align="C"></div><div class="aligner-dot" data-align="MR"></div><div class="aligner-dot" data-align="BL"></div><div class="aligner-dot" data-align="BC"></div><div class="aligner-dot" data-align="BR"></div></div><button class="btn" id="autoplayBtn">AUTOPLAY</button><button class="btn" id="exportBtn">EXPORT</button></div></div><div class="main"><div class="timeline-sidebar"><div class="scrubber"></div><div class="timeline-dots" id="timelineDots"></div></div><div class="canvas-container"><div class="canvas" id="canvas"></div></div></div><div class="bottom-panel"><div class="timeline"><div class="timeline-line"></div><div class="timeline-marker in-marker" id="inMarker"></div><div class="timeline-marker on-marker" id="onMarker"></div><div class="timeline-marker out-marker" id="outMarker"></div><div class="timeline-label in-label">in</div><div class="timeline-label on-label">on</div><div class="timeline-label out-label">out</div></div><div class="anim-controls"><input type="number" class="anim-value" id="inValue" value="1" min="0" max="10" step="0.1"><input type="number" class="anim-value" id="outValue" value="1" min="0" max="10" step="0.1"></div></div><div class="export-panel" id="exportPanel"><textarea class="export-textarea" id="exportText" readonly></textarea><div class="export-actions"><button class="btn" id="copyBtn">COPY</button><button class="btn" id="downloadBtn">DOWNLOAD</button><button class="btn" id="closeExportBtn">CLOSE</button></div></div><script src="ss.min.js"></script></body></html>
